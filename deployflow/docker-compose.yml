# ============================================
# DeployFlow - Docker Compose Configuration
# Runs all services with a single command
# ============================================

version: '3.8'

services:
  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deployflow-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - deployflow-network

  # ---- Frontend UI ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deployflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - deployflow-network

  # ---- Redis Cache ----
  redis:
    image: redis:7.2-alpine
    container_name: deployflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - deployflow-network

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: deployflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: deployflow
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: deployflow_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-ARGS", "pg_isready", "-U", "admin", "-d", "deployflow"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - deployflow-network

networks:
  deployflow-network:
    driver: bridge

volumes:
  postgres_data:
