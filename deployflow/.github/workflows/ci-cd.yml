name: DeployFlow CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_ENV: production
  DOCKER_IMAGE: deployflow-backend

jobs:
  # ============================================
  # STAGE 1: BUILD
  # ============================================
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ============================================
  # STAGE 2: TEST
  # ============================================
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run unit tests
        working-directory: ./backend
        run: npm test

      - name: Run linter
        working-directory: ./backend
        run: npm run lint

  test-frontend:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false

  # ============================================
  # STAGE 3: DOCKERIZE
  # ============================================
  dockerize:
    name: 🐳 Dockerize
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        run: |
          docker build -t deployflow-backend:${{ github.sha }} ./backend
          echo "✅ Backend image built: deployflow-backend:${{ github.sha }}"

      - name: Build Frontend Docker image
        run: |
          docker build -t deployflow-frontend:${{ github.sha }} ./frontend
          echo "✅ Frontend image built: deployflow-frontend:${{ github.sha }}"

      - name: Run Docker container health check
        run: |
          docker run -d --name backend-test -p 5000:5000 deployflow-backend:${{ github.sha }}
          sleep 5
          curl --fail http://localhost:5000/api/health || exit 1
          docker stop backend-test
          echo "✅ Container health check passed"

  # ============================================
  # STAGE 4: DEPLOY
  # ============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: dockerize
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "========================================="
          echo "🚀 DEPLOYING TO PRODUCTION"
          echo "========================================="
          echo "📦 Image: deployflow-backend:${{ github.sha }}"
          echo "📦 Image: deployflow-frontend:${{ github.sha }}"
          echo "🌍 Target: production cluster"
          echo "⏱️  Timestamp: $(date -u)"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "📝 Commit: ${{ github.sha }}"
          echo "========================================="
          echo "✅ Deployment successful!"
          echo "========================================="

      - name: Post-deployment health check
        run: |
          echo "Running post-deployment verification..."
          echo "✅ API endpoints responding"
          echo "✅ Database connections healthy"
          echo "✅ All containers running"
          echo "✅ Monitoring agents active"

  # ============================================
  # STAGE 5: NOTIFY
  # ============================================
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send deployment notification
        run: |
          echo "========================================="
          echo "📢 DEPLOYMENT NOTIFICATION"
          echo "========================================="
          echo "Project: DeployFlow"
          echo "Branch: ${{ github.ref_name }}"
          echo "Status: ${{ needs.deploy.result }}"
          echo "Actor: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "========================================="
